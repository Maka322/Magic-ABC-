
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>La Loteria De Las Letras</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>ABC Magico</h1>
        <div class="controles">
            <button onclick="generarCartas('letras')">🔤 Ver Abecedario</button>
            <button onclick="generarCartas('vocales')">🅰️ Ver Vocales</button>
            <span class="contador">Vistas: <span id="cuenta">0</span></span>
        </div>
    </header>

    <main class="contenedor-principal">
        <section id="galeria" class="galeria-grid"></section>

        <section id="visor" class="visor-derecho">
            <div id="pantalla-imagen">
                <h2>¡Haz clic en una letra!</h2>
                <p>Aprender es una aventura</p>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
